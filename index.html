<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDM User Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/js-md5@0.7.3/src/md5.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1b2434;
            margin: 0;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 768px !important;
            }
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        .code-block {
            background-color: #1a1a1a;
            color: white;
            padding: 1.5rem 1rem 1rem 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            white-space: pre-wrap;
            position: relative;
            overflow: auto;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background-color: #444;
            color: #fff;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            z-index: 10;
            opacity: 0.8;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            opacity: 1;
            background-color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="text-2xl font-bold mb-6 text-center">NDM User Generator</h1>
    <div class="relative mb-4">
        <input type="text" id="model" name="model" class="block w-full px-3 pt-6 pb-2 border border-gray-300 rounded-md bg-transparent appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 peer" placeholder=" " required>
        <label for="model" class="absolute left-3 top-2 text-gray-500 text-sm transition-all duration-200 pointer-events-none peer-placeholder-shown:top-5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-blue-500">Device Model
            (show configurator status)</label>
    </div>
    <div class="relative mb-4">
        <input type="text" id="username" name="username" class="block w-full px-3 pt-6 pb-2 border border-gray-300 rounded-md bg-transparent appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 peer" placeholder=" " required>
        <label for="username"
               class="absolute left-3 top-2 text-gray-500 text-sm transition-all duration-200 pointer-events-none peer-placeholder-shown:top-5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-blue-500">Username</label>
    </div>
    <div class="relative mb-6">
        <input type="password" id="password" name="password" class="block w-full px-3 pt-6 pb-2 border border-gray-300 rounded-md pr-10 bg-transparent appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 peer" placeholder=" " required>
        <label for="password"
               class="absolute left-3 top-2 text-gray-500 text-sm transition-all duration-200 pointer-events-none peer-placeholder-shown:top-5 peer-placeholder-shown:text-base peer-placeholder-shown:text-gray-400 peer-focus:top-2 peer-focus:text-sm peer-focus:text-blue-500">Password</label>
        <button type="button" id="togglePassword" tabindex="-1" class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-400 hover:text-gray-700 focus:outline-none">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
        </button>
    </div>
    <button type="button" id="generateBtn" class="w-full text-white p-2 rounded-md hover:bg-blue-700 hover:opacity-85 transition-opacity" style="background-color: #0097dc;">Generate</button>
    <div id="result" class="mt-6 hidden">
        <div class="relative">
            <span class="absolute top-2 left-3 text-xs pointer-events-none select-none z-10" style="color: #bdb7b7;">startup-config</span>
            <button class="copy-btn">Copy</button>
            <pre id="outputBlock" class="code-block relative"></pre>
        </div>
        <div class="relative mt-4">
            <span class="absolute top-2 left-3 text-xs pointer-events-none select-none z-10" style="color: #bdb7b7;">CLI</span>
            <button class="copy-btn">Copy</button>
            <pre id="outputBlockAlt" class="code-block"></pre>
        </div>
    </div>
</div>
